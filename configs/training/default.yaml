# Default Training Configuration

# Optimization
batch_size: 2
learning_rate: 3.0e-4
weight_decay: 0.00001
epochs: 100
grad_clip: 5.0

# Optimizer
optimizer:
  name: adam
  betas: [0.9, 0.999]
  # For SGD:
  # name: sgd
  # momentum: 0.9
  # nesterov: true

# Learning rate scheduler
scheduler:
  name: cosine  # cosine, step, plateau
  # For step scheduler:
  # step_size: 30
  # gamma: 0.1
  # For plateau:
  # patience: 10
  # factor: 0.5

# Loss function
loss:
  name: dice_bce  # dice, bce, dice_bce
  dice_weight: 1.0
  bce_weight: 1.0

# Early stopping
early_stopping:
  enabled: true
  patience: 15
  min_delta: 0.001
  monitor: val_dice

# Checkpointing
checkpoint:
  save_best: true
  save_last: true
  save_every: 10  # epochs

# Logging
logging:
  tensorboard: true
  log_every: 10  # iterations
  log_images: true
  log_images_every: 50  # iterations
