# Federated Learning Configuration  (v7 — FedProx + GroupNorm)

# Flower server settings
server:
  address: "0.0.0.0:8080"
  num_rounds: 45

# Client configuration
client:
  num_clients: 2
  min_fit_clients: 2
  min_evaluate_clients: 2
  fraction_fit: 1.0
  fraction_evaluate: 1.0

# Active federation nodes (KNH-Brain + AKU-Prostate)
clients:
  - id: brain
    name: KNH-Brain
    dataset: fets
    subdir: FeTS2022
    norm: zscore
    max_samples: 200
  - id: prostate
    name: AKU-Prostate
    dataset: prostate
    subdir: Prostate
    norm: percentile
    max_samples: 120

# Aggregation: FedProx proximal term is applied client-side;
# server aggregation remains standard weighted FedAvg.
strategy:
  name: fedprox
  proximal_mu: 0.01      # mu=0 reverts to standard FedAvg

# Local training per round
local_epochs: 5
local_batch_size: 2

# Learning-rate schedule: linear warmup + cosine decay
lr_schedule:
  base_lr: 3.0e-4
  warmup_rounds: 3

# Privacy (future extension)
privacy:
  differential_privacy: false
